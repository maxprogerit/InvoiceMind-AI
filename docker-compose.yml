version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: invoicemind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invoicemind}
      POSTGRES_USER: ${POSTGRES_USER:-invoicemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoicemind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoicemind} -d ${POSTGRES_DB:-invoicemind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: invoicemind-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: invoicemind-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "${KAFKA_BROKER_PORT:-9092}:9092"
      - "${KAFKA_CONTROLLER_PORT:-9093}:9093"
    volumes:
      - kafka_data:/var/lib/kafka/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoicemind-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-invoicemind}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-invoicemind}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-invoicemind}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_JWT_SECRET: ${JWT_SECRET:-change_me_for_production_minimum_32_chars_123}
      APP_JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoicemind-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}/api/v1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: invoicemind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  kafka_data:
